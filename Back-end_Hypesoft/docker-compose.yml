version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: hypersoft-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: HypersoftDB
    volumes:
      - mongodb_data:/data/db
    networks:
      - hypersoft-network

  mongo-express:
    image: mongo-express:latest
    container_name: hypersoft-mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017/
      ME_CONFIG_BASICAUTH: false
    depends_on:
      - mongodb
    networks:
      - hypersoft-network

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: hypersoft-keycloak
    ports:
      - "8080:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    command: start-dev
    volumes:
      - keycloak_data:/opt/keycloak/data
    networks:
      - hypersoft-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hypersoft-api
    expose:
      - "8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__MongoDB: mongodb://mongodb:27017
      MongoDB__Database: HypersoftDB
    depends_on:
      - mongodb
      - keycloak
    networks:
      - hypersoft-network

  nginx:
    image: nginx:alpine
    container_name: hypersoft-nginx
    ports:
      - "5000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - hypersoft-network

  frontend:
    build:
      context: ../Front-End_Hypesoft
      dockerfile: Dockerfile
    container_name: hypersoft-frontend
    ports:
      - "3000:3000"
    environment:
      VITE_KEYCLOAK_URL: http://localhost:8080
      VITE_KEYCLOAK_REALM: hypesoft
      VITE_KEYCLOAK_CLIENT_ID: hypesoft-frontend
    depends_on:
      - nginx
    networks:
      - hypersoft-network

volumes:
  mongodb_data:
  keycloak_data:

networks:
  hypersoft-network:
    driver: bridge
